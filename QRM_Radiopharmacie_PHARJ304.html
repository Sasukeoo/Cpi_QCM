// État conservé en mémoire pendant la session (pas de localStorage : non supporté dans les artefacts)
let state = {}; // { qnum: { selected: [idx,...], checked: bool } }

function getQState(num){
  if(!state[num]) state[num] = { selected: [], checked:false };
  return state[num];
}

function arraysEqualAsSets(a,b){
  if(a.length !== b.length) return false;
  const sa = [...a].sort().join(",");
  const sb = [...b].sort().join(",");
  return sa === sb;
}

function render(){
  const root = document.getElementById("quizRoot");
  root.innerHTML = "";

  QUESTIONS.forEach(q=>{
    const qs = getQState(q.num);
    const card = document.createElement("div");
    card.className = "qcard " + (qs.checked ? "answered" : "unanswered");
    if(qs.checked){
      const correct = arraysEqualAsSets(qs.selected, q.answer);
      card.classList.add(correct ? "correct" : "incorrect");
      card.classList.add("locked");
    }

    const numLine = document.createElement("div");
    numLine.className = "qnum";
    numLine.innerHTML = "Question " + q.num + " / 26"
      + '<span class="qtype">' + (q.type === "multi" ? "Plusieurs réponses" : "Une seule réponse") + "</span>";
    card.appendChild(numLine);

    const qtext = document.createElement("div");
    qtext.className = "qtext";
    qtext.textContent = "Q" + q.num + ". " + q.text;
    card.appendChild(qtext);

    const optsWrap = document.createElement("div");
    optsWrap.className = "options";

    q.options.forEach((optText, idx)=>{
      const opt = document.createElement("div");
      opt.className = "opt " + (q.type === "single" ? "radio" : "checkbox");
      const isSelected = qs.selected.includes(idx);
      if(isSelected) opt.classList.add("selected");

      if(qs.checked){
        const isCorrectOpt = q.answer.includes(idx);
        if(isCorrectOpt) opt.classList.add("correct-answer");
        if(isSelected && !isCorrectOpt) opt.classList.add("wrong-selected");
      }

      const letter = String.fromCharCode(97 + idx); // a, b, c...
      opt.innerHTML = '<div class="box">' + (isSelected ? "✓" : "") + '</div><span class="label">' + letter + ") " + optText + "</span>";

      if(!qs.checked){
        opt.addEventListener("click", ()=>{
          if(q.type === "single"){
            qs.selected = [idx];
          } else {
            const pos = qs.selected.indexOf(idx);
            if(pos >= 0) qs.selected.splice(pos,1);
            else qs.selected.push(idx);
          }
          render();
        });
      }

      optsWrap.appendChild(opt);
    });

    card.appendChild(optsWrap);

    const checkRow = document.createElement("div");
    checkRow.className = "check-row";

    if(!qs.checked){
      const btn = document.createElement("button");
      btn.className = "btn";
      btn.textContent = "Valider la réponse";
      btn.disabled = qs.selected.length === 0;
      btn.addEventListener("click", ()=>{
        qs.checked = true;
        render();
        updateProgress();
      });
      checkRow.appendChild(btn);
    } else {
      const correct = arraysEqualAsSets(qs.selected, q.answer);
      const tag = document.createElement("div");
      tag.className = "result-tag " + (correct ? "correct" : "incorrect");
      tag.textContent = correct ? "✓ Correct" : "✗ Incorrect";
      checkRow.appendChild(tag);

      const redoBtn = document.createElement("button");
      redoBtn.className = "btn btn-secondary";
      redoBtn.textContent = "Recommencer cette question";
      redoBtn.addEventListener("click", ()=>{
        qs.checked = false;
        qs.selected = [];
        render();
        updateProgress();
      });
      checkRow.appendChild(redoBtn);
    }

    card.appendChild(checkRow);
    root.appendChild(card);
  });

  updateProgress();
}

function updateProgress(){
  const total = QUESTIONS.length;
  let answered = 0, correct = 0;
  QUESTIONS.forEach(q=>{
    const qs = getQState(q.num);
    if(qs.checked){
      answered++;
      if(arraysEqualAsSets(qs.selected, q.answer)) correct++;
    }
  });
  document.getElementById("progressFill").style.width = (answered/total*100) + "%";
  document.getElementById("progressLabel").textContent = answered + " / " + total;

  const banner = document.getElementById("scoreBanner");
  if(answered === total){
    banner.classList.add("show");
    document.getElementById("scoreBig").textContent = correct + " / " + total;
    document.getElementById("scoreSub").textContent = "questions correctes sur l'ensemble du QRM";
  } else {
    banner.classList.remove("show");
  }
}

document.getElementById("resetBtn").addEventListener("click", ()=>{
  state = {};
  render();
});

render();
</script>

</body>
</html>
