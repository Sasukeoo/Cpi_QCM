            .nav-links {

            .btn-nav {

                font-size: 12px;

                border: 1px solid var(--line);
                color: var(--text-dim);
                padding: 8px 16px;
                border-radius: 20px;
                font-size: 13px;
                cursor: pointer;
                transition: all 0.2s;

            }

            .tab:hover {
                border-color: var(--text-dim);
                color: var(--text);
            }

            .tab.active {

                    var(--teal-dim),
                    var(--teal)

                color: #0b0f19;
                font-weight: 600;
                box-shadow: 0 4px 15px rgba(61, 219, 217, 0.25);

            .progress-container {
                max-width: 500px;
                margin: 0 auto;
                display: flex;
                align-items: center;
                gap: 15px;
            }

            .progress-track {
                flex: 1;
                height: 8px;
                background: #17212f;
                border-radius: 4px;
                overflow: hidden;
                border: 1px solid var(--line);
            }

            .progress-fill {
                height: 100%;
                background: linear-gradient(
                    90deg,
                    var(--teal-dim),
                    var(--teal)
                );
                width: 0%;
                transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            }

            .progress-label {
                font-size: 13px;
                color: var(--text-dim);
                font-family: var(--mono);
                min-width: 60px;
                text-align: right;
            }

            .container {
                max-width: 760px;
                margin: 30px auto 0;
                padding: 0 16px;
            }

            .score-banner {
                background: linear-gradient(135deg, var(--panel), #162438);
                border: 1px solid var(--teal-dim);
                border-radius: 12px;
                padding: 24px;
                text-align: center;
                margin-bottom: 25px;
                display: none;
                animation: slideDown 0.5s ease-out;
            }

            @keyframes slideDown {
                from {
                    transform: translateY(-10px);
                    opacity: 0;
                }
                to {
                    transform: translateY(0);
                    opacity: 1;
                }
            }

            .score-banner.show {
                display: block;
            }
            .score-banner .big-score {
                font-family: var(--serif);
                font-size: 40px;
                color: var(--teal);
                font-weight: 700;
            }

            .score-banner .sub-score {
                font-size: 14px;
                color: var(--text-dim);
                margin-top: 6px;
            }

                background: var(--panel);
                border: 1px solid var(--line);
                border-radius: 12px;
                padding: 24px;
                margin-bottom: 20px;
                position: relative;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
                transition:
                    transform 0.2s,
                    border-color 0.2s;
            }

            .qcard:hover {
                border-color: #3f5573;
            }

            .qcard.unanswered::before {
                content: "";
                position: absolute;
                left: 0;
                top: 20px;
                bottom: 20px;
                width: 4px;
                background: var(--amber);
                border-radius: 0 4px 4px 0;
            }

            .qcard.answered.correct::before {
                content: "";
                position: absolute;
                left: 0;
                top: 20px;
                bottom: 20px;
                width: 4px;
                background: var(--good);
                border-radius: 0 4px 4px 0;
            }

            .qcard.answered.incorrect::before {
                content: "";
                position: absolute;
                left: 0;
                top: 20px;
                bottom: 20px;
                width: 4px;
                background: var(--bad);
                border-radius: 0 4px 4px 0;
            }

            .qnum {
                font-size: 11px;
                color: var(--teal);
                letter-spacing: 0.1em;
                font-family: var(--mono);
                text-transform: uppercase;
                margin-bottom: 10px;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .qtype {
                font-size: 10px;
                color: var(--text-dim);
                border: 1px solid var(--line);
                border-radius: 4px;
                padding: 2px 6px;
                font-family: var(--sans);
                font-weight: 500;
            }

            .qtext {
                font-family: var(--serif);
                font-size: 18px;
                color: var(--text);
                margin: 0 0 16px 0;
                line-height: 1.5;
            }

            .options {
                display: flex;
                flex-direction: column;
                gap: 8px;
            }

            .opt {
                display: flex;
                align-items: flex-start;
                gap: 12px;
                background: var(--panel-2);
                border: 1px solid var(--line);
                border-radius: 8px;
                padding: 12px 14px;
                cursor: pointer;
                transition: all 0.15s ease;
                font-size: 15px;
            }

            .opt:hover {
                border-color: #4a5e7b;
                background: #222d42;
            }

            .opt .checkbox-indicator {
                flex: 0 0 18px;
                width: 18px;
                height: 18px;
                margin-top: 2px;
                border: 1px solid #5a7192;
                border-radius: 4px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 11px;
                color: var(--bg);
                transition: all 0.15s;
                background: transparent;
            }

            .opt.radio .checkbox-indicator {
                border-radius: 50%;
            }

            .opt.selected .checkbox-indicator {
                background: var(--teal);
                border-color: var(--teal);
                box-shadow: 0 0 8px rgba(61, 219, 217, 0.4);
            }

            .opt span.label-text {
                color: var(--text);
            }

            .qcard.locked .opt {
                cursor: default;
            }

            .qcard.locked .opt:hover {
                background: var(--panel-2);
                border-color: var(--line);
            }

            .opt.correct-answer {
                border-color: var(--good);
                background: rgba(16, 185, 129, 0.08);
            }
            .opt.correct-answer:hover {
                background: rgba(16, 185, 129, 0.08);
                border-color: var(--good);
            }

            .opt.wrong-selected {
                border-color: var(--bad);
                background: rgba(239, 68, 68, 0.08);
            }
            .opt.wrong-selected:hover {
                background: rgba(239, 68, 68, 0.08);
                border-color: var(--bad);
            }

                margin-top: 18px;
                display: flex;
                align-items: center;
                gap: 12px;
                flex-wrap: wrap;
            }

                    135deg,
                    var(--teal-dim),
                    var(--teal)

                border: none;
                border-radius: 6px;

                font-size: 13px;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.2s;
                display: inline-flex;
                align-items: center;
                gap: 6px;

            .btn:hover {
                transform: translateY(-1px);
                box-shadow: 0 4px 12px rgba(61, 219, 217, 0.3);
            }

            .btn:disabled {
                opacity: 0.3;
                transform: none;
                box-shadow: none;
                cursor: not-allowed;
            }

            .btn-secondary {
                background: transparent;
                border: 1px solid var(--line);
                color: var(--text);
            }

            .btn-secondary:hover {
                border-color: var(--teal);
                color: var(--teal);

            }

                font-weight: 600;
                display: inline-flex;
                align-items: center;
                gap: 4px;

                color: var(--text);

                outline: none;

            .fitb-answer-sheet li {
                margin-bottom: 4px;

                font-weight: 500;

            .matching-container {
                display: flex;
                flex-direction: column;

                gap: 15px;

                border: 1px solid var(--line);
                border-radius: 8px;
                padding: 10px 14px;

            .matching-row.correct {
                border-color: var(--good);
            }

            .matching-row.incorrect {
                border-color: var(--bad);
            }

            .match-left {
                flex: 1;
                font-weight: 500;
                font-size: 14px;
            }

            .match-right {
                flex: 1;
            }

            .match-select {
                width: 100%;
                background: var(--panel);
                border: 1px solid var(--line);
                color: var(--text);
                padding: 6px 10px;
                border-radius: 6px;
                font-family: var(--sans);
                font-size: 13px;
                outline: none;
                cursor: pointer;
                transition: all 0.2s;

            .match-select:focus {
                border-color: var(--teal);

            .match-select.correct {
                border-color: var(--good);
                color: var(--good);
                background: rgba(16, 185, 129, 0.05);
            }

            .match-select.incorrect {
                border-color: var(--bad);
                color: var(--bad);
                background: rgba(239, 68, 68, 0.05);
            }

            .match-correct-text {
                font-size: 11px;
                color: var(--good);
                margin-top: 4px;
                display: block;
            }

            /* Footer and reset styling */
            .footer-bar {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                background: rgba(11, 15, 25, 0.95);
                backdrop-filter: blur(10px);

                padding: 15px;
                display: flex;
                justify-content: center;
                gap: 15px;

            }

            /* Scroll bar styling */
            ::-webkit-scrollbar {
                width: 8px;
            }
            ::-webkit-scrollbar-track {
                background: var(--bg);
            }
            ::-webkit-scrollbar-thumb {
                background: var(--line);
                border-radius: 4px;
            }
            ::-webkit-scrollbar-thumb:hover {
                background: #3c5270;
            }
        </style>

            function buildQuizList() {
                quizQuestions = [];

                    QUESTIONS_JUIN_2025.forEach((q) =>

                            ...q,

                        quizQuestions.push({

                if (currentFilter === "all" || currentFilter === "pva") {
                    FILL_IN_THE_BLANKS.forEach((ex) =>
                        quizQuestions.push({ ...ex, isFitb: true }),
                    );
                    MATCHING_EXERCISES.forEach((ex) =>
                        quizQuestions.push({ ...ex, isMatching: true }),
                    );
                }

            function getInitialState(item) {
                if (!userState[item.id]) {
                    if (item.isQcm) {
                        userState[item.id] = { selected: [], checked: false };
                    } else if (item.isFitb) {
                        userState[item.id] = {
                            fitb: Array(item.options.length).fill(""),
                            checked: false,
                        };
                    } else if (item.isMatching) {
                        userState[item.id] = { matches: {}, checked: false }; // { leftKey: selectedRightVal }
                    }
                }
                return userState[item.id];
            }

            function arraysEqualAsSets(a, b) {
                if (a.length !== b.length) return false;
                const sa = [...a].sort().join(",");
                const sb = [...b].sort().join(",");
                return sa === sb;
            }

            function renderQuiz() {
                const root = document.getElementById("quizRoot");
                root.innerHTML = "";

                if (quizQuestions.length === 0) {
                    root.innerHTML =
                        '<div style="text-align:center; padding: 40px; color: var(--text-dim);">Aucun exercice trouvé.</div>';
                    return;
                }

                quizQuestions.forEach((item, index) => {
                    const cardState = getInitialState(item);

                    if (item.isQcm) {
                        renderQcmCard(item, cardState, index + 1, root);
                    } else if (item.isFitb) {
                        renderFitbCard(item, cardState, index + 1, root);
                    } else if (item.isMatching) {
                        renderMatchingCard(item, cardState, index + 1, root);
                    }
                });

                updateProgress();
            }

            function renderQcmCard(q, state, indexNum, parent) {
                const card = document.createElement("div");
                card.className =
                    "qcard " + (state.checked ? "answered" : "unanswered");

                if (state.checked) {
                    const isCorrect = arraysEqualAsSets(
                        state.selected,
                        q.answer,
                    );
                    card.classList.add(isCorrect ? "correct" : "incorrect");
                    card.classList.add("locked");
                }

                const sourceName =
                    q.source === "juin2025" ? "Juin 2025" : "Août 2024";
                const numLine = document.createElement("div");
                numLine.className = "qnum";
                numLine.innerHTML = `Question ${q.num} (${sourceName}) <span class="qtype">${q.type === "multi" ? "Plusieurs réponses" : "Une seule réponse"}</span>`;
                card.appendChild(numLine);

                const qtext = document.createElement("div");
                qtext.className = "qtext";
                qtext.textContent = q.text;
                card.appendChild(qtext);

                const optsWrap = document.createElement("div");
                optsWrap.className = "options";

                q.options.forEach((optText, idx) => {
                    const opt = document.createElement("div");
                    opt.className =
                        "opt " + (q.type === "single" ? "radio" : "checkbox");
                    const isSelected = state.selected.includes(idx);
                    if (isSelected) opt.classList.add("selected");

                    if (state.checked) {
                        const isCorrectOpt = q.answer.includes(idx);
                        if (isCorrectOpt) opt.classList.add("correct-answer");
                        if (isSelected && !isCorrectOpt)
                            opt.classList.add("wrong-selected");
                    }

                    const letter = String.fromCharCode(97 + idx); // a, b, c...
                    opt.innerHTML = `<div class="checkbox-indicator">${isSelected ? "✓" : ""}</div><span class="label-text">${letter}) ${optText}</span>`;

                    if (!state.checked) {
                        opt.addEventListener("click", () => {
                            if (q.type === "single") {
                                state.selected = [idx];
                            } else {
                                const pos = state.selected.indexOf(idx);
                                if (pos >= 0) state.selected.splice(pos, 1);
                                else state.selected.push(idx);
                            }
                            renderQuiz();
                        });
                    }
                    optsWrap.appendChild(opt);
                });

                card.appendChild(optsWrap);

                // Bottom actions
                const checkRow = document.createElement("div");
                checkRow.className = "check-row";

                if (!state.checked) {
                    const btn = document.createElement("button");
                    btn.className = "btn";
                    btn.textContent = "Valider la réponse";
                    btn.disabled = state.selected.length === 0;
                    btn.addEventListener("click", () => {
                        state.checked = true;
                        renderQuiz();
                    });
                    checkRow.appendChild(btn);
                } else {
                    const isCorrect = arraysEqualAsSets(
                        state.selected,
                        q.answer,
                    );
                    const tag = document.createElement("div");
                    tag.className =
                        "result-tag " + (isCorrect ? "correct" : "incorrect");
                    tag.innerHTML = isCorrect ? "✓ Correct" : "✗ Incorrect";
                    checkRow.appendChild(tag);

                    const redoBtn = document.createElement("button");
                    redoBtn.className = "btn btn-secondary";
                    redoBtn.textContent = "Recommencer";
                    redoBtn.addEventListener("click", () => {
                        state.checked = false;
                        state.selected = [];
                        renderQuiz();
                    });
                    checkRow.appendChild(redoBtn);
                }

                card.appendChild(checkRow);
                parent.appendChild(card);
            }

                const numLine = document.createElement("div");
                numLine.className = "qnum";
                numLine.innerHTML = `Texte à trous / PVA <span class="qtype">Complétez le texte</span>`;
                card.appendChild(numLine);

                const qtext = document.createElement("div");
                qtext.className = "qtext";
                qtext.style.fontFamily = "var(--sans)";
                qtext.style.fontSize = "16px";

                // Construct the text with dropdowns
                let textTemplate = ex.text;

                // We split by placeholders like {0}, {1}...
                const parts = textTemplate.split(/(\{\d+\})/);

                parts.forEach((part) => {
                    const m = part.match(/^\{(\d+)\}$/);
                    if (m) {
                        const idx = parseInt(m[1]);
                        const select = document.createElement("select");
                        select.className = "fitb-select";
                        if (state.checked) {
                            select.disabled = true;
                            const correctWord = ex.words[idx];
                            const selectedWord = state.fitb[idx];
                            if (selectedWord === correctWord) {
                                select.classList.add("correct");
                            } else {
                                select.classList.add("incorrect");
                            }
                        }

                        // Default placeholder option
                        const optPlaceholder = document.createElement("option");
                        optPlaceholder.value = "";
                        optPlaceholder.textContent = "...";
                        select.appendChild(optPlaceholder);

                        // Add all possibilities for this dropdown
                        ex.options[idx].forEach((optText) => {
                            const option = document.createElement("option");
                            option.value = optText;
                            option.textContent = optText;
                            if (state.fitb[idx] === optText) {
                                option.selected = true;
                            }
                            select.appendChild(option);
                        });

                        select.addEventListener("change", (e) => {
                            state.fitb[idx] = e.target.value;
                            // Check if all are answered to enable button
                            renderQuiz();
                        });

                        qtext.appendChild(select);
                    } else {
                        qtext.appendChild(document.createTextNode(part));
                    }
                });

                card.appendChild(qtext);

                // Add an answer key below if validated and incorrect
                if (state.checked && !isCorrect) {
                    const keyBox = document.createElement("div");
                    keyBox.className = "fitb-answer-sheet";
                    keyBox.innerHTML = `<strong>Correction :</strong>`;
                    const ol = document.createElement("ol");
                    ex.words.forEach((word, i) => {
                        const li = document.createElement("li");
                        li.innerHTML = `Trou ${i + 1} : <span class="corr-val">${word}</span> (votre réponse : <i>${state.fitb[i] || "vide"}</i>)`;
                        ol.appendChild(li);
                    });
                    keyBox.appendChild(ol);
                    card.appendChild(keyBox);
                }

                // Bottom actions
                const checkRow = document.createElement("div");
                checkRow.className = "check-row";

                if (!state.checked) {
                    const btn = document.createElement("button");
                    btn.className = "btn";
                    btn.textContent = "Valider la réponse";
                    // Disable if any blank is unanswered
                    const anyEmpty = state.fitb.some((val) => val === "");
                    btn.disabled = anyEmpty;
                    btn.addEventListener("click", () => {
                        state.checked = true;
                        renderQuiz();
                    });
                    checkRow.appendChild(btn);
                } else {
                    const tag = document.createElement("div");
                    tag.className =
                        "result-tag " + (isCorrect ? "correct" : "incorrect");
                    tag.innerHTML = isCorrect ? "✓ Correct" : "✗ Incorrect";
                    checkRow.appendChild(tag);

                    const redoBtn = document.createElement("button");
                    redoBtn.className = "btn btn-secondary";
                    redoBtn.textContent = "Recommencer";
                    redoBtn.addEventListener("click", () => {
                        state.checked = false;
                        state.fitb = Array(ex.options.length).fill("");
                        renderQuiz();
                    });
                    checkRow.appendChild(redoBtn);
                }

                card.appendChild(checkRow);
                parent.appendChild(card);
            }

            function renderMatchingCard(ex, state, indexNum, parent) {
                const card = document.createElement("div");
                card.className =
                    "qcard " + (state.checked ? "answered" : "unanswered");

                let allCorrect = true;
                if (state.checked) {
                    ex.pairs.forEach((pair) => {
                        if (state.matches[pair.left] !== pair.right) {
                            allCorrect = false;
                        }
                    });
                    card.classList.add(allCorrect ? "correct" : "incorrect");
                    card.classList.add("locked");
                }

                const numLine = document.createElement("div");
                numLine.className = "qnum";
                numLine.innerHTML = `Exercice d'Appariement / PVA <span class="qtype">Apparier les paires</span>`;
                card.appendChild(numLine);

                const desc = document.createElement("div");
                desc.className = "qtext";
                desc.textContent = ex.description;
                card.appendChild(desc);

                const matchContainer = document.createElement("div");
                matchContainer.className = "matching-container";

                // Get all possible right-side choices for dropdown, shuffled or sorted
                const rightChoices = ex.pairs.map((p) => p.right).sort();

                ex.pairs.forEach((pair) => {
                    const row = document.createElement("div");
                    row.className = "matching-row";

                    const leftText = document.createElement("div");
                    leftText.className = "match-left";
                    leftText.textContent = pair.left;
                    row.appendChild(leftText);

                    const rightSide = document.createElement("div");
                    rightSide.className = "match-right";

                    const select = document.createElement("select");
                    select.className = "match-select";
                    if (state.checked) {
                        select.disabled = true;
                        const isPairCorrect =
                            state.matches[pair.left] === pair.right;
                        select.classList.add(
                            isPairCorrect ? "correct" : "incorrect",
                        );
                        row.classList.add(
                            isPairCorrect ? "correct" : "incorrect",
                        );
                    }

                    const optPlaceholder = document.createElement("option");
                    optPlaceholder.value = "";
                    optPlaceholder.textContent =
                        "-- Choisir la correspondance --";
                    select.appendChild(optPlaceholder);

                    rightChoices.forEach((choice) => {
                        const option = document.createElement("option");
                        option.value = choice;
                        option.textContent = choice;
                        if (state.matches[pair.left] === choice) {
                            option.selected = true;
                        }
                        select.appendChild(option);
                    });

                    select.addEventListener("change", (e) => {
                        state.matches[pair.left] = e.target.value;
                        renderQuiz();
                    });

                    rightSide.appendChild(select);

                    // Show correct text below if checked and incorrect
                    if (
                        state.checked &&
                        state.matches[pair.left] !== pair.right
                    ) {
                        const corrText = document.createElement("span");
                        corrText.className = "match-correct-text";
                        corrText.innerHTML = `✓ Réponse correcte : <strong>${pair.right}</strong>`;
                        rightSide.appendChild(corrText);
                    }

                    row.appendChild(rightSide);
                    matchContainer.appendChild(row);
                });

                card.appendChild(matchContainer);

                // Bottom actions
                const checkRow = document.createElement("div");
                checkRow.className = "check-row";

                if (!state.checked) {
                    const btn = document.createElement("button");
                    btn.className = "btn";
                    btn.textContent = "Valider la réponse";
                    // Disable if any element is not matched
                    const answeredCount = Object.keys(state.matches).filter(
                        (k) => state.matches[k] !== "",
                    ).length;
                    btn.disabled = answeredCount < ex.pairs.length;
                    btn.addEventListener("click", () => {
                        state.checked = true;
                        renderQuiz();
                    });
                    checkRow.appendChild(btn);
                } else {
                    const tag = document.createElement("div");
                    tag.className =
                        "result-tag " + (allCorrect ? "correct" : "incorrect");
                    tag.innerHTML = allCorrect ? "✓ Correct" : "✗ Incorrect";
                    checkRow.appendChild(tag);

                    const redoBtn = document.createElement("button");
                    redoBtn.className = "btn btn-secondary";
                    redoBtn.textContent = "Recommencer";
                    redoBtn.addEventListener("click", () => {
                        state.checked = false;
                        state.matches = {};
                        renderQuiz();
                    });
                    checkRow.appendChild(redoBtn);
                }

                card.appendChild(checkRow);
                parent.appendChild(card);
            }

            function updateProgress() {
                const total = quizQuestions.length;
                let answered = 0;
                let correct = 0;

                quizQuestions.forEach((item) => {
                    const state = getInitialState(item);
                    if (state.checked) {
                        answered++;

                        // Check correctness
                        if (item.isQcm) {
                            if (arraysEqualAsSets(state.selected, item.answer))
                                correct++;
                        } else if (item.isFitb) {
                            let isFitbCorrect = true;
                            for (let i = 0; i < item.words.length; i++) {
                                if (state.fitb[i] !== item.words[i]) {
                                    isFitbCorrect = false;
                                    break;
                                }
                            }
                            if (isFitbCorrect) correct++;
                        } else if (item.isMatching) {
                            let isMatchCorrect = true;
                            item.pairs.forEach((pair) => {
                                if (state.matches[pair.left] !== pair.right) {
                                    isMatchCorrect = false;
                                }
                            });
                            if (isMatchCorrect) correct++;
                        }
                    }
                });

                document.getElementById("progressFill").style.width =
                    total > 0 ? (answered / total) * 100 + "%" : "0%";
                document.getElementById("progressLabel").textContent =
                    answered + " / " + total;

                const banner = document.getElementById("scoreBanner");
                if (answered === total && total > 0) {
                    banner.classList.add("show");
                    document.getElementById("scoreBig").textContent =
                        correct + " / " + total;
                    document.getElementById("scoreSub").textContent =
                        "exercices répondus correctement sur l'ensemble de la sélection";
                } else {
                    banner.classList.remove("show");
                }
            }

            function resetQuiz() {
                quizQuestions.forEach((item) => {
                    userState[item.id] = null;
                });
                renderQuiz();
            }

            // Initial build
            setFilter("all");
        </script>
    </body>
</html>
